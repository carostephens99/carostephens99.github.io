<style>
  :root {
    --cream: #faf6f0;
    --warm-white: #fff9f3;
    --clay: #c97d52;
    --sage: #7a9e7e;
    --dusty-rose: #d4956a;
    --deep: #2c2416;
    --muted: #9a8f82;
    --soft-green: #b8c9b0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--deep); font-family: 'Jost', sans-serif; font-weight: 300; cursor: none; }

  .cursor { width: 12px; height: 12px; background: var(--clay); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background 0.2s; mix-blend-mode: multiply; }
  .cursor.hover { width: 40px; height: 40px; background: var(--sage); opacity: 0.5; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, var(--cream) 60%, transparent); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--deep); text-decoration: none; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--clay); }

  /* Hero */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 80px; overflow: hidden; }
  .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 80px 48px 80px 72px; }
  .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--clay); margin-bottom: 24px; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 6vw, 5.5rem); font-weight: 300; line-height: 1.05; opacity: 0; animation: fadeUp 0.8s 0.4s forwards; }
  .hero-title em { font-style: italic; color: var(--clay); }
  .hero-sub { margin-top: 28px; font-size: 0.95rem; line-height: 1.8; color: var(--muted); max-width: 380px; opacity: 0; animation: fadeUp 0.8s 0.6s forwards; }
  .hero-actions { margin-top: 48px; display: flex; gap: 20px; align-items: center; opacity: 0; animation: fadeUp 0.8s 0.8s forwards; }
  .btn-primary { padding: 14px 36px; background: var(--clay); color: white; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: background 0.3s, transform 0.2s; display: inline-block; }
  .btn-primary:hover { background: var(--deep); transform: translateY(-2px); }
  .btn-ghost { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--muted); padding-bottom: 2px; transition: color 0.3s; }
  .btn-ghost:hover { color: var(--clay); border-color: var(--clay); }

  .hero-right { position: relative; overflow: hidden; opacity: 0; animation: fadeIn 1.2s 0.3s forwards; }
  .hero-mosaic { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; height: 100%; gap: 3px; }
  .hero-mosaic img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
  .hero-mosaic img:hover { transform: scale(1.03); }

  /* Portfolio */
  #portfolio { padding: 100px 72px; background: var(--warm-white); }
  .portfolio-intro { max-width: 480px; margin-bottom: 64px; }
  .section-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--clay); margin-bottom: 16px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 300; line-height: 1.2; }
  .section-title em { font-style: italic; color: var(--clay); }
  .portfolio-intro p { margin-top: 20px; font-size: 0.95rem; line-height: 1.9; color: var(--muted); }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 48px; }
  .filter-tab { padding: 8px 20px; border: 1px solid rgba(44,36,22,0.15); background: transparent; font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: none; transition: all 0.3s; }
  .filter-tab:hover, .filter-tab.active { background: var(--clay); border-color: var(--clay); color: white; }

  /* Masonry gallery */
  .gallery { columns: 3; column-gap: 12px; }
  .gallery-item { break-inside: avoid; margin-bottom: 12px; position: relative; overflow: hidden; cursor: none; }
  .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
  .gallery-item:hover img { transform: scale(1.03); }
  .gallery-item .overlay { position: absolute; inset: 0; background: rgba(44,36,22,0.75); display: flex; flex-direction: column; justify-content: flex-end; padding: 24px; opacity: 0; transition: opacity 0.4s; }
  .gallery-item:hover .overlay { opacity: 1; }
  .overlay-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: white; margin-bottom: 4px; }
  .overlay-meta { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 12px; }
  .overlay-btn { padding: 8px 18px; background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; cursor: none; transition: background 0.3s; width: fit-content; }
  .overlay-btn:hover { background: var(--clay); border-color: var(--clay); }

  /* Lightbox */
  .lightbox { position: fixed; inset: 0; background: rgba(44,36,22,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 80vw; max-height: 85vh; object-fit: contain; }
  .lightbox-info { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center; color: white; }
  .lightbox-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; }
  .lightbox-medium { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-top: 6px; }
  .lightbox-close { position: absolute; top: 32px; right: 40px; background: none; border: none; color: white; font-size: 1.5rem; cursor: none; opacity: 0.6; transition: opacity 0.2s; }
  .lightbox-close:hover { opacity: 1; }
  .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: white; font-size: 2rem; cursor: none; opacity: 0.5; transition: opacity 0.2s; padding: 20px; }
  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 20px; }
  .lightbox-next { right: 20px; }

  /* Commissions */
  #commissions { background: var(--deep); color: var(--cream); padding: 100px 72px; }
  #commissions .section-label { color: var(--soft-green); }
  #commissions .section-title { color: var(--cream); }
  #commissions .section-title em { color: var(--dusty-rose); }
  .commission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; margin-top: 64px; align-items: start; }
  .commission-text p { margin-top: 20px; font-size: 0.95rem; line-height: 1.9; color: rgba(250,246,240,0.6); }
  .commission-steps { margin-top: 40px; display: flex; flex-direction: column; gap: 28px; }
  .step { display: flex; gap: 20px; align-items: flex-start; }
  .step-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; color: var(--clay); line-height: 1; min-width: 36px; }
  .step-content h4 { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--cream); margin-bottom: 6px; }
  .step-content p { font-size: 0.85rem; line-height: 1.7; color: rgba(250,246,240,0.5); margin: 0 !important; }
  .commission-form { background: rgba(250,246,240,0.04); border: 1px solid rgba(250,246,240,0.1); padding: 48px; }
  .form-group { margin-bottom: 28px; }
  .form-group label { display: block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(250,246,240,0.4); margin-bottom: 10px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(250,246,240,0.15); color: var(--cream); font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300; padding: 10px 0; outline: none; transition: border-color 0.3s; cursor: none; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--clay); }
  .form-group select option { background: var(--deep); }
  .form-group textarea { resize: none; height: 80px; }
  .btn-submit { width: 100%; padding: 16px; background: var(--clay); color: white; border: none; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: none; transition: background 0.3s; margin-top: 8px; }
  .btn-submit:hover { background: var(--dusty-rose); }

  /* About */
  #about { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; padding: 100px 72px; }
  .about-image { aspect-ratio: 4/5; overflow: hidden; position: relative; }
  .about-image img { width: 100%; height: 100%; object-fit: cover; }
  .about-image::before { content: ''; position: absolute; top: -16px; left: -16px; right: 16px; bottom: 16px; border: 1px solid var(--clay); opacity: 0.3; pointer-events: none; z-index: 1; }
  .about-content p { font-size: 0.95rem; line-height: 1.9; color: var(--muted); margin-bottom: 20px; margin-top: 20px; }
  .about-signature { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-style: italic; color: var(--clay); margin-top: 32px; }

  footer { background: var(--deep); color: var(--cream); padding: 48px 72px; display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; }
  .footer-links { display: flex; gap: 32px; list-style: none; }
  .footer-links a { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(250,246,240,0.4); text-decoration: none; transition: color 0.3s; }
  .footer-links a:hover { color: var(--clay); }
  .footer-copy { font-size: 0.7rem; color: rgba(250,246,240,0.25); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }

  @media (max-width: 900px) {

    #portfolio, #commissions, #about { padding: 72px 24px; }
    .gallery { columns: 2; }
    .commission-grid, #about { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 24px; text-align: center; padding: 40px 24px; }
  }
  @media (max-width: 500px) { .gallery { columns: 1; } }
</style>

  if (m.includes('watercolor')) return 'watercolor';
  if (m.includes('ink')) return 'ink';
  if (m.includes('pencil')) return 'pencil';
  return 'other';
}

const gallery = document.getElementById('gallery');
let currentLbIndex = 0;

function buildGallery(filter) {
  gallery.innerHTML = '';
  paintings.forEach((p, i) => {
    const cat = getMediumFilter(p.medium);
    if (filter !== 'all' && cat !== filter) return;
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="${p.src}" alt="${p.title}" loading="lazy">
      <div class="overlay">
        <div class="overlay-title">${p.title}</div>
        <div class="overlay-meta">${p.medium}</div>
        <button class="overlay-btn" data-index="${i}">View</button>
      </div>`;
    item.querySelector('.overlay-btn').addEventListener('click', () => openLightbox(i));
    item.addEventListener('click', () => openLightbox(i));
    gallery.appendChild(item);
    cursor.classList.remove('hover');
  });
}
buildGallery('all');

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    buildGallery(tab.dataset.filter);
  });
});

// Lightbox
function openLightbox(index) {
  currentLbIndex = index;
  const p = paintings[index];
  document.getElementById('lbImg').src = p.src;
  document.getElementById('lbTitle').textContent = p.title;
  document.getElementById('lbMedium').textContent = p.medium;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lbClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); });
document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); openLightbox((currentLbIndex - 1 + paintings.length) % paintings.length); });
document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); openLightbox((currentLbIndex + 1) % paintings.length); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  if (e.key === 'ArrowLeft') openLightbox((currentLbIndex - 1 + paintings.length) % paintings.length);
  if (e.key === 'ArrowRight') openLightbox((currentLbIndex + 1) % paintings.length);
});

// Scroll reveal
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
reveals.forEach(r => observer.observe(r));
</script>
